# fly.toml app configuration file generated for whatsapp-bot-4mrn on 2026-05-20T15:30:07+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'whatsapp-bot-4mrn'
primary_region = 'iad'
kill_signal = 'SIGTERM'

[build]
  dockerfile = 'Dockerfile'

[env]
  AI_BACKEND = 'gemini'
  NODE_ENV = 'production'

[[mounts]]
  source = 'auth_data'
  destination = '/app/auth'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
