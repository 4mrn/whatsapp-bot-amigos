app = "whatsapp-bot"
primary_region = "iad"
kill_signal = "SIGTERM"

[build]
  dockerfile = "Dockerfile"

[env]
  AI_BACKEND = "gemini"
  NODE_ENV = "production"

[[mounts]]
  source = "auth_data"
  destination = "/app/auth"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
